<svg xmlns="http://www.w3.org/2000/svg" width="320" height="80" viewBox="0 0 320 80">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c1666b"/>
      <stop offset="100%" stop-color="#a5555a"/>
    </linearGradient>
  </defs>

  <!-- Icône carrée arrondie avec initiales -->
  <rect x="4" y="8" width="64" height="64" rx="14" fill="url(#bg)"/>
  <text x="36" y="52" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="32" fill="#ffffff">ES</text>

  <!-- Barre décorative -->
  <rect x="80" y="24" width="3" height="32" rx="1.5" fill="#c1666b" opacity="0.6"/>

  <!-- Texte du nom -->
  <text x="96" y="42" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="26" fill="#f8f9fa">Ethan</text>
  <text x="96" y="62" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="14" fill="#c1666b" letter-spacing="3">SERVILLE</text>
</svg>
